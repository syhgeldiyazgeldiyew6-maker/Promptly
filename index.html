<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promptly - AI Art Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #ffffff; --text: #202124; --header: #ffffff; --primary: #4285F4; --border: #dfe1e5; --accent: #34a853; }
        .dark-mode { --bg: #202124; --text: #e8eaed; --header: #202124; --border: #3c4043; --accent: #00e676; }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; }
        header { position: sticky; top: 0; z-index: 100; background: var(--header); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 22px; font-weight: bold; color: var(--text); text-decoration: none; }
        .logo span { color: var(--primary); }
        .search-area { padding: 20px 15px; text-align: center; }
        .search-box { position: relative; max-width: 584px; margin: 0 auto; }
        #mainSearch { width: 100%; padding: 12px 45px; border-radius: 24px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        .search-box i { position: absolute; left: 15px; top: 14px; color: #9aa0a6; }
        #promptFeed { padding: 10px; display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: 0 auto; }
        .news-item { background: var(--header); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; margin-bottom: 10px; }
        .news-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #f8f9fa; }
        .news-item .content { padding: 15px; }
        .news-item .title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .news-item .desc { font-size: 14px; color: #5f6368; margin-bottom: 40px; }
        .copy-btn { position: absolute; bottom: 15px; right: 15px; background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .copy-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<header>
    <i class="fa fa-bars" style="visibility:hidden"></i>
    <a href="#" class="logo"><span>P</span>romptly</a>
    <i class="fa fa-adjust" onclick="toggleDarkMode()"></i>
</header>

<div class="search-area">
    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" id="mainSearch" placeholder="Promptlarda ara..." onkeyup="search()">
    </div>
</div>

<div id="promptFeed">
    <div id="status" style="text-align:center; padding: 50px; color: #9aa0a6;">
        <i class="fa fa-spinner fa-spin"></i><br><br>Veriler yükleniyor patron...
    </div>
</div>

<script>
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

    // SENİN TABLONUN LİNKİ - BU FORMAT EN GÜVENLİSİ
    const SHEET_ID = '1CyvzuWjALYU_xyZWZZXnpypiIT4PHFJIAFOjUl6nQWI';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    async function loadPrompts() {
        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            
            // CSV Parçalama Mantığı (Virgül ve Tırnak Karmaşasını Çözer)
            const rows = text.split('\n').slice(1);
            const feed = document.getElementById('promptFeed');
            const status = document.getElementById('status');
            
            if (rows.length === 0) {
                status.innerHTML = "Tablo boş görünüyor patron!";
                return;
            }

            status.style.display = 'none';

            rows.forEach(row => {
                // regex ile tırnak içindeki virgülleri koruyarak parçala
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                
                if(cols && cols.length >= 4) {
                    const cleanCols = cols.map(c => c.replace(/^"|"$/g, '').trim());
                    const [id, kategori, baslik, prompt, aciklama, resim] = cleanCols;

                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `
                        <img src="${resim || ''}" onerror="this.src='https://via.placeholder.com/600x600?text=Resim+Yuklenemedi'">
                        <div class="content">
                            <div class="title">${baslik}</div>
                            <div class="desc">${aciklama || ''}</div>
                        </div>
                        <button class="copy-btn" onclick="copyPrompt(\`${prompt.replace(/`/g, "\\`")}\`)">KODU KOPYALA</button>
                    `;
                    feed.appendChild(div);
                }
            });
        } catch (e) {
            document.getElementById('status').innerHTML = "Bağlantı kurulamadı. Sayfayı yenilemeyi dene patron!";
            console.error(e);
        }
    }

    function copyPrompt(text) {
        navigator.clipboard.writeText(text);
        alert("Prompt kopyalandı!");
    }

    function search() {
        let val = document.getElementById('mainSearch').value.toLowerCase();
        let items = document.getElementsByClassName('news-item');
        for(let item of items) {
            item.style.display = item.innerText.toLowerCase().includes(val) ? "block" : "none";
        }
    }

    loadPrompts();
</script>

</body>
</html>
